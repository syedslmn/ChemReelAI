<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChemLab AI — Class 12 Visual Lab Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <!-- Page header -->
  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">&#9879;</span>
        <span class="logo-text">ChemLab <span class="logo-accent">AI</span></span>
      </div>
      <span class="badge">Class 12 &bull; CBSE</span>
    </div>
  </header>

  <!-- Three-panel layout: Input (1) | Video (2) | Steps (1) -->
  <main class="split-layout">

    <!-- LEFT: Input panel -->
    <aside class="panel panel-input">
      <h2 class="panel-title">Generate a Lab Video</h2>
      <p class="panel-sub">Describe any experiment in one line.</p>

      <form id="experiment-form">
        <label for="experiment-input">Experiment</label>
        <div class="input-wrap">
          <span class="input-icon">&#128300;</span>
          <input
            type="text"
            id="experiment-input"
            placeholder="e.g. Titration of HCl with NaOH"
            autocomplete="off"
            required
          />
        </div>

        <p class="examples-label">Try an example:</p>
        <div class="examples">
          <button type="button" class="example-chip">Cutting glass tube and glass rod</button>
          <button type="button" class="example-chip">Boring a cork</button>
          <button type="button" class="example-chip">Titration of NaOH vs HCl</button>
          <button type="button" class="example-chip">Chromatography of plant pigments</button>
        </div>

        <button type="submit" id="submit-btn">
          <span id="btn-label">&#9654;&#65038; Generate Video</span>
          <span id="btn-spinner" class="spinner" hidden></span>
        </button>
      </form>

      <!-- Status -->
      <div id="status-box" class="status-box"></div>
    </aside>

    <!-- CENTER: Video panel -->
    <section class="panel panel-video">
      <div id="video-placeholder" class="video-placeholder">
        <span class="placeholder-icon">&#127909;</span>
        <p>Your lab walkthrough will appear here</p>
      </div>
      <div id="video-container">
        <video id="video-player" controls></video>
      </div>
    </section>

    <!-- RIGHT: Procedure steps panel -->
    <aside class="panel panel-steps">
      <h3 class="panel-title">Procedure Steps</h3>
      <div id="steps-placeholder" class="steps-placeholder">
        <span class="placeholder-icon-sm">&#128203;</span>
        <p>Steps will appear here once generated</p>
      </div>
      <div id="steps-container" class="steps-container">
        <ol id="steps-list" class="steps-list"></ol>
      </div>
    </aside>

  </main>

  <!-- Footer -->
  <footer class="site-footer">
    <p>Powered by Amazon Bedrock Nova</p>
  </footer>

<script src="/js/app.js"></script>
</body>
</html>
